{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 400px;">
    <h3 class="text-center mb-4">Register</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success w-100">Daftar</button>
    </form>

    <div class="text-center mt-3">
        Sudah punya akun?
        <a href="/login/">Login di sini</a>
    </div>
    
</div>

{% endblock %}
